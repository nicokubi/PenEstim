reference:
- title: One-step master function
  desc: >
    The master function for an arbitrary combination of genes and cancers. 
  contents:
  - PPP
  
- title: One-step master function with predefined models
  desc: >
    Functions that takes pedigree and master database with predefined
    set of genes and cancers.
  contents:
  - BRCAPRO
  - BRCAPRO5
  - BRCAPRO6
  - MMRPRO
  - PanelPRO11
  - PanelPRO22
  
- title: Pedigree Checks and Age Imputation
